<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full text-center bg-white border border-gray-100 rounded-3xl p-8 md:p-12 shadow-sm flex flex-col items-center gap-6">
    
    <!-- Visual Luxury Graphic Badge -->
    <div class="relative flex items-center justify-center w-28 h-28">
      <!-- Ambient Background Glow Circle Rings -->
      <div class="absolute inset-0 bg-amber-50 rounded-full animate-ping opacity-60"></div>
      <div class="absolute inset-2 bg-amber-100/70 rounded-full"></div>
      
      <!-- Primary Icon Display Grid Terminal -->
      <div class="relative p-5 bg-white border border-amber-200 text-amber-600 rounded-full shadow-xs">
        <mat-icon class="!h-12 !w-12 !text-[48px] flex items-center justify-center">explore_off</mat-icon>
      </div>
    </div>

    <!-- Error Codes Identity Metadata -->
    <div>
      <span class="text-xs font-black tracking-widest text-amber-600 uppercase">Error Code 404</span>
      <h1 class="text-3xl font-black text-gray-950 tracking-tight mt-1">Scent Not Found</h1>
      <p class="text-sm text-gray-500 mt-2 max-w-xs mx-auto leading-relaxed">
        The fragrance path you are trying to access doesn't exist or has been permanently archived from our inventory collection.
      </p>
    </div>

    <!-- Decorative Dotted Partition Border Separator Line -->
    <hr class="w-full border-gray-100" />

    <!-- Navigation Action Layout Blocks -->
    <div class="w-full flex flex-col gap-3">
      
      <!-- Action Primary: Redirect directly back to safe home catalogs -->
      <button 
        routerLink="/"
        class="w-full bg-gray-950 hover:bg-amber-600 text-white font-bold py-3.5 px-6 rounded-xl text-xs uppercase tracking-wider shadow-sm transition-colors duration-200 flex items-center justify-center gap-2"
      >
        <mat-icon class="!h-4 !w-4 !text-[16px]">home</mat-icon>
        <span>Back to Storefront</span>
      </button>

      <!-- Action Secondary: Dynamic step-backward stack traversal -->
      <button 
        (click)="handleGoBack()"
        class="w-full bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3.5 px-6 rounded-xl border border-gray-200 text-xs uppercase tracking-wider transition-colors duration-200 flex items-center justify-center gap-2"
      >
        <mat-icon class="!h-4 !w-4 !text-[16px]">keyboard_backspace</mat-icon>
        <span>Go Back Previous Page</span>
      </button>

    </div>

    <!-- Optional Support Link Inline Anchors -->
    <p class="text-[11px] text-gray-400 mt-2">
      Need immediate shopping assistance? 
      <a routerLink="/support" class="text-amber-600 hover:text-amber-700 font-medium underline underline-offset-2">Contact Concierge</a>
    </p>

  </div>
</div>
