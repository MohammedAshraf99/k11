<div
  class="group relative flex w-full max-w-[280px] flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white p-3 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-md"
>
  <!-- Badges Container (Floats above the photo) -->
  <div class="p-3 absolute top-3 left-3 z-10 flex flex-col gap-1.5">
    <span
      class="rounded-full bg-emerald-500 px-2.5 py-0.5 text-[11px] font-semibold uppercase tracking-wider text-white shadow-sm"
    >
      New
    </span>
    <!-- Optional Discount Badge -->
    <span
      class="rounded-full bg-amber-500 px-2.5 py-0.5 text-[11px] font-semibold uppercase tracking-wider text-white shadow-sm"
    >
      -20%
    </span>
  </div>

  <!-- Product Photo Container -->
    <a routerLink="/product/1">
  <div
    class="relative aspect-square w-full overflow-hidden rounded-xl bg-gray-50"
  >
      <img
        src="https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=500&auto=format&fit=crop"
        alt="Premium Oud Perfume"
        class="h-full w-full object-cover object-center transition-transform duration-500 group-hover:scale-105"
      />
  </div>
</a>

  <!-- Product Details -->
  <div class="mt-4 flex flex-col flex-grow">
    <!-- Brand / Category (Optional subtle touch) -->
    <span class="text-[11px] font-medium uppercase tracking-wider text-gray-400"
      >Oud Shop Luxury</span
    >

    <!-- Product Name -->
    <h3
      class="mt-1 line-clamp-1 text-base font-semibold text-gray-800 transition-colors group-hover:text-amber-700"
    >
      Royal Oud Intense
    </h3>

    <!-- Price & Actions Row -->
    <div class="mt-4 flex items-center justify-between">
      <!-- Price Layout -->
      <div class="flex flex-col">
        <span class="text-xs text-gray-400 line-through">$120.00</span>
        <span class="text-lg font-bold text-gray-900">$96.00</span>
      </div>

      <!-- Angular Material Add to Cart Button -->
      <div class="flex gap-2">
        <button
          (click)="addToCart()"
          mat-mini-fab
          color="accent"
          aria-label="Add to cart"
          class="!bg-amber-600 hover:!bg-amber-700 !text-white transition-colors duration-200"
        >
          <mat-icon>shopping_cart_border</mat-icon>
        </button>
        <button
          (click)="addToWishlist()"
          mat-mini-fab
          color="accent"
          aria-label="Add to wishlist"
          class="!bg-amber-600 hover:!bg-amber-700 !text-white transition-colors duration-200"
        >
          <mat-icon>favorite_border</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>
